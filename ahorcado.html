<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHORCADO CARTOON PRO FIX</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --wood: #5d4037;
            --bg-dark: #1a1a2e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Arial Black', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            color: white;
        }

        .game-screen {
            flex: 1;
            margin: 10px;
            background: #f0f0f0;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1), 0 10px 0 #2980b9;
        }

        .watermark {
            position: absolute;
            font-size: 5rem;
            opacity: 0.05;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        .cat-tag {
            background: var(--danger);
            padding: 8px 20px;
            border-radius: 0 0 15px 15px;
            font-size: 0.9rem;
            box-shadow: 0 4px 0 #c0392b;
            z-index: 10;
        }

        .canvas-area {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .word-display {
            font-size: 2.2rem;
            color: #2c3e50;
            text-shadow: 2px 2px 0px #bdc3c7;
            margin-bottom: 20px;
            letter-spacing: 8px;
            font-weight: 900;
            z-index: 5;
        }

        .hint-float {
            position: absolute; top: 15px; right: 15px;
            background: #f1c40f; border: none;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 1.5rem; box-shadow: 0 4px 0 #f39c12;
            cursor: pointer; z-index: 10;
        }

        .keyboard {
            background: #2c3e50;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px; padding: 12px 12px 35px 12px;
            height: 38vh;
        }

        .key {
            background: #ecf0f1;
            border: none;
            border-radius: 8px;
            color: #2c3e50;
            font-size: 1.2rem;
            font-weight: 900;
            box-shadow: 0 5px 0 #bdc3c7;
            transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }

        .key:active { transform: translateY(3px); box-shadow: 0 2px 0 #bdc3c7; }
        .key.correct { visibility: hidden; pointer-events: none; }
        .key.wrong { 
            background: #95a5a6 !important; 
            box-shadow: 0 2px 0 #7f8c8d !important; 
            color: #bdc3c7 !important;
            transform: translateY(3px);
        }

        #overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .modal-msg { font-size: 3rem; font-weight: 900; margin-bottom: 20px; padding: 0 20px; }
        .green-text { color: var(--success); text-shadow: 0 5px 0 #27ae60; }
        .red-text { color: var(--danger); text-shadow: 0 5px 0 #c0392b; }

        .btn-retry {
            padding: 15px 40px; border-radius: 50px;
            border: none; color: white; font-size: 1.5rem;
            font-weight: bold; box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="game-screen">
        <div class="watermark" style="top:20%; left:10%">😵</div>
        <div class="watermark" style="top:60%; right:15%">😵</div>
        <div class="watermark" style="top:30%; right:5%">😵</div>

        <div id="cat-label" class="cat-tag">CATEGORÍA</div>
        <button class="hint-float" onclick="pistaAnuncio()">💡</button>

        <div class="canvas-area">
            <canvas id="hangman" width="250" height="280"></canvas>
        </div>

        <div id="word-box" class="word-display">_ _ _ _</div>
    </div>

    <div class="keyboard" id="kb"></div>

    <div id="overlay">
        <div id="status" class="modal-msg"></div>
        <p id="info-word" style="font-size: 1.2rem; color: #aaa; margin-bottom: 30px;"></p>
        <button id="action-btn" class="btn-retry" onclick="location.reload()"></button>
    </div>

<script>
    const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";
    
    const banco = {
        "ANIMALES": ["ORNITORRINCO", "GUEPARDO", "PANGOLIN", "AVESTRUZ", "HIENA", "CARPINCHO", "MURCIELAGO", "ESCORPION", "JIRAFA", "CAMELLO"],
        "FRUTAS": ["GUANABANA", "LECHOSA", "MANDARINA", "GUAYABA", "ZAPOTE", "ARANDANO", "FRAMBUESA", "CEREZA", "KIWI", "COCO"],
        "COMIDAS": ["PABELLON", "AREPA", "CACHAPA", "LASAÑA", "PAELLA", "CEVICHE", "HAMBURGUESA", "PIZZA", "SUSHI", "RAVIOLI"],
        "COSAS": ["SACACORES", "AEROGRAFO", "EXTINTOR", "PARARRAYOS", "TELESCOPIO", "BRUJULA", "MARTILLO", "RELOJ", "LAMPARA", "SILLA"],
        "PAÍSES": ["VENEZUELA", "KAZAJISTAN", "MADAGASCAR", "SINGAPUR", "FILIPINAS", "NORUEGA", "EGIPTO", "SUIZA", "ALEMANIA", "BRASIL"]
    };

    let cats = Object.keys(banco);
    let currentCat = cats[Math.floor(Math.random()*cats.length)];
    let selected = banco[currentCat][Math.floor(Math.random()*banco[currentCat].length)];
    let guessed = [];
    let fails = 0;
    // Expresiones sin círculo
    const faces = ["", "🫤", "🙁", "☹️", "😦", "😨", "😵‍💫", "😵"];

    const canvas = document.getElementById('hangman');
    const ctx = canvas.getContext('2d');

    function init() {
        document.getElementById('cat-label').innerText = currentCat;
        guessed.push(selected[0]); // Letra de regalo

        const kb = document.getElementById('kb');
        "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button');
            b.innerText = l; b.className = 'key';
            if(l === selected[0]) b.classList.add('correct');
            b.onclick = () => play(l, b);
            kb.appendChild(b);
        });
        render();
    }

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // HORCA DE MADERA
        ctx.fillStyle = "#5d4037"; ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 3;
        ctx.fillRect(30, 250, 190, 15); ctx.strokeRect(30, 250, 190, 15);
        ctx.fillRect(60, 40, 20, 210); ctx.strokeRect(60, 40, 20, 210);
        ctx.fillRect(60, 40, 110, 15); ctx.strokeRect(60, 40, 110, 15);
        
        ctx.strokeStyle = "#d4a373"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(155, 55); ctx.lineTo(155, 85); ctx.stroke();

        ctx.strokeStyle = "#34495e"; ctx.lineWidth = 5; ctx.lineCap = "round";
        
        if(fails >= 1) { 
            // Cabeza: Solo el emoji, tamaño acorde
            ctx.font = "45px Arial"; 
            ctx.textAlign = "center";
            ctx.fillText(faces[fails], 155, 125); // Ajustado para que encaje con el cuello
        }
        if(fails >= 2) { ctx.beginPath(); ctx.moveTo(155, 135); ctx.lineTo(155, 190); ctx.stroke(); }
        if(fails >= 3) { ctx.beginPath(); ctx.moveTo(155, 145); ctx.lineTo(125, 175); ctx.stroke(); }
        if(fails >= 4) { ctx.beginPath(); ctx.moveTo(155, 145); ctx.lineTo(185, 175); ctx.stroke(); }
        if(fails >= 5) { ctx.beginPath(); ctx.moveTo(155, 190); ctx.lineTo(130, 235); ctx.stroke(); }
        if(fails >= 6) { ctx.beginPath(); ctx.moveTo(155, 190); ctx.lineTo(180, 235); ctx.stroke(); }
    }

    function render() {
        document.getElementById('word-box').innerText = selected.split('').map(l => guessed.includes(l) ? l : "_").join(" ");
        drawScene();
        if(!document.getElementById('word-box').innerText.includes("_")) end(true);
        if(fails >= 7) end(false);
    }

    function play(l, b) {
        if(selected.includes(l)) {
            guessed.push(l);
            b.classList.add('correct');
        } else {
            fails++;
            b.classList.add('wrong');
        }
        render();
    }

    function pistaAnuncio() {
        let t = Date.now();
        window.open(smartlink, '_blank');
        window.onfocus = () => {
            if((Date.now()-t)/1000 < 6) {
                alert("DEBES VER EL ANUNCIO 6 SEGUNDOS");
            } else {
                let faltan = selected.split('').filter(l => !guessed.includes(l));
                if(faltan.length > 0) {
                    let letra = faltan[0];
                    guessed.push(letra);
                    document.querySelectorAll('.key').forEach(k => {
                        if(k.innerText === letra) k.classList.add('correct');
                    });
                    render();
                }
            }
        }
    }

    function end(win) {
        const ov = document.getElementById('overlay');
        const st = document.getElementById('status');
        const btn = document.getElementById('action-btn');
        ov.style.display = "flex";
        
        if(win) {
            st.innerHTML = "TE SALVASTE 😮‍💨<br><span style='font-size:1.5rem'>SIGUIENTE NIVEL</span>";
            st.className = "modal-msg green-text";
            btn.innerText = "CONTINUAR";
            btn.style.backgroundColor = "var(--success)";
        } else {
            st.innerHTML = "ESTAS MUERTO 😵<br><span style='font-size:1.5rem'>REINTENTAR</span>";
            st.className = "modal-msg red-text";
            btn.innerText = "REVIVIR";
            btn.style.backgroundColor = "var(--danger)";
        }
        document.getElementById('info-word').innerText = "LA PALABRA ERA: " + selected;
    }

    init();
</script>
</body>
</html>
