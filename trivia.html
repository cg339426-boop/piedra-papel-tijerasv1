<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>TRIVIA FLASH GOLD ⚡</title>
    <style>
        :root {
            --neon-yellow: #ffcc00;
            --neon-red: #ff3131;
            --neon-green: #00ff88;
            --bg: #050505;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header-stats {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 5;
        }

        .stat-box {
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--neon-yellow);
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: 900;
            color: var(--neon-yellow);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            font-size: 0.85rem;
        }

        .game-card {
            background: rgba(20, 20, 20, 0.98);
            border: 2px solid var(--neon-yellow);
            border-radius: 35px;
            padding: 35px 20px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.1);
            box-sizing: border-box;
            z-index: 2;
        }

        h1 { font-size: 1.4rem; margin: 0; color: var(--neon-yellow); text-transform: uppercase; letter-spacing: 2px; }

        .timer-wrapper {
            width: 100%; height: 10px; background: #222; border-radius: 10px;
            margin: 20px 0; overflow: hidden; border: 1px solid #333;
        }

        #timer-bar { width: 100%; height: 100%; background: var(--neon-yellow); transition: width 0.1s linear, background-color 0.3s; }

        #question-box { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; line-height: 1.3;}

        .options-list { display: grid; gap: 10px; }

        .option {
            background: rgba(255, 204, 0, 0.05); border: 1.5px solid var(--neon-yellow); color: var(--neon-yellow);
            padding: 14px; border-radius: 15px; font-size: 0.9rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; transition: 0.2s; text-align: left;
            width: 100%; box-sizing: border-box;
        }

        .option:active { transform: scale(0.98); background: rgba(255, 204, 0, 0.2); }

        .option-letter {
            background: var(--neon-yellow); color: black; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            margin-right: 12px; font-weight: 900; flex-shrink: 0; font-size: 0.8rem;
        }

        .btn-boost {
            margin-top: 25px; background: transparent; color: white;
            border: 2px solid var(--neon-yellow); padding: 12px; border-radius: 15px;
            font-size: 0.75rem; font-weight: bold; cursor: pointer; width: 100%;
            animation: pulse-yellow 2s infinite;
        }

        @keyframes pulse-yellow { 0%, 100% { box-shadow: 0 0 5px var(--neon-yellow); } 50% { box-shadow: 0 0 15px var(--neon-yellow); } }

        .status-overlay {
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98); 
            border-radius: 33px;
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 10;
            padding: 25px;
            box-sizing: border-box;
        }

        .icon-anim { font-size: 70px; margin-bottom: 10px; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .btn-action {
            margin-top: 20px; border: none; padding: 14px 30px; border-radius: 50px;
            font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase;
            width: 80%;
        }

        .check-icon { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
        .cross-icon { color: var(--neon-red); text-shadow: 0 0 20px var(--neon-red); }
        .btn-next { background: var(--neon-green); color: black; }
        .btn-retry { background: var(--neon-red); color: white; }
        
        .clown-msg { font-size: 1rem; color: var(--neon-red); font-weight: bold; line-height: 1.4; display: block; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">💰 <span id="coin-count">50</span></div>
        <div class="stat-box">NIVEL: <span id="level-count">1</span></div>
    </div>

    <div class="game-card">
        <div id="status-overlay" class="status-overlay">
            <div id="status-icon" class="icon-anim"></div>
            <div id="status-text" style="font-weight: bold; font-size: 1.2rem; text-align: center; width: 100%;"></div>
            <div id="reward-text" style="margin-top: 8px; font-size: 0.9rem; color: #aaa;"></div>
            <button id="status-btn" class="btn-action"></button>
        </div>

        <h1>Trivia Flash</h1>
        <div class="timer-wrapper"><div id="timer-bar"></div></div>
        
        <div id="question-box">Cargando desafío...</div>
        
        <div class="options-list" id="options-cont"></div>
        
        <button class="btn-boost" onclick="getExtraTime()">⏱️ RECARGAR TIEMPO (ADS)</button>
    </div>

    <script>
        const linkAds = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";
        
        let monedas = 50;
        let nivel = 1;
        let indexActual = 0;
        let porcentajeTiempo = 100;
        let reloj;
        const letras = ["A", "B", "C"];

        // Tu banco de preguntas se mantiene igual...
        let bancoPreguntas = [
            {q:"¿Qué país tiene más pirámides?", o:["Egipto","Sudán","México"], a:"Sudán"},
            {q:"¿Gas más abundante en el aire?", o:["Oxígeno","Nitrógeno","Argón"], a:"Nitrógeno"},
            {q:"¿Mamífero que no puede saltar?", o:["Elefante","Hipopótamo","Oso"], a:"Elefante"},
            {q:"¿País origen árbol de Navidad?", o:["Noruega","Alemania","Finlandia"], a:"Alemania"},
            {q:"¿Minutos en un día completo?", o:["1200","1440","1560"], a:"1440"},
            {q:"¿Lugar más seco de la Tierra?", o:["Sahara","Atacama","Antártida"], a:"Atacama"},
            {q:"¿Animal que más humanos mata?", o:["Tiburón","Mosquito","León"], a:"Mosquito"},
            {q:"¿Metal más caro del mundo?", o:["Oro","Rodio","Platino"], a:"Rodio"},
            {q:"¿Teclas piano estándar?", o:["88","86","92"], a:"88"},
            {q:"¿País más pequeño del mundo?", o:["Vaticano","Mónaco","Malta"], a:"Vaticano"},
            {q:"¿Órgano que más energía gasta?", o:["Corazón","Cerebro","Hígado"], a:"Cerebro"},
            {q:"¿Dedo más corto de la mano?", o:["Pulgar","Meñique","Anular"], a:"Pulgar"},
            {q:"¿Velocidad de la luz (aprox)?", o:["300.000 km/s","150.000 km/s","1M km/s"], a:"300.000 km/s"},
            {q:"¿Año caída muro de Berlín?", o:["1989","1991","1985"], a:"1989"},
            {q:"¿Capital de Venezuela?", o:["Caracas","Valencia","Maracay"], a:"Caracas"},
            {q:"¿Hueso más largo del cuerpo?", o:["Fémur","Húmero","Tibia"], a:"Fémur"},
            {q:"¿Planeta más cercano al Sol?", o:["Mercurio","Venus","Marte"], a:"Mercurio"},
            {q:"¿Quién pintó 'La Guernica'?", o:["Picasso","Dalí","Miró"], a:"Picasso"},
            {q:"¿Cuántos corazones tiene un pulpo?", o:["3","1","2"], a:"3"},
            {q:"¿Símbolo químico de la Plata?", o:["Ag","Au","Pl"], a:"Ag"},
            {q:"¿Cuál es el río más largo?", o:["Amazonas","Nilo","Misisipi"], a:"Amazonas"},
            {q:"¿En qué país está la Torre de Pisa?", o:["Francia","Italia","España"], a:"Italia"},
            {q:"¿Siglo en que inició la Rev. Francesa?", o:["XVIII","XVII","XIX"], a:"XVIII"},
            {q:"¿Elemento con símbolo 'K'?", o:["Potasio","Kriptón","Calcio"], a:"Potasio"},
            {q:"¿País con más población?", o:["India","China","EUA"], a:"India"},
            {q:"¿Inventó la bombilla?", o:["Edison","Tesla","Newton"], a:"Edison"},
            {q:"¿Cuántos planetas hay?", o:["8","9","7"], a:"8"},
            {q:"¿Moneda de Japón?", o:["Yen","Wwon","Yuan"], a:"Yen"},
            {q:"¿Animal más veloz del mundo?", o:["Guepardo","Halcón Peregrino","Tiburón"], a:"Halcón Peregrino"},
            {q:"¿Color de la esmeralda?", o:["Verde","Azul","Rojo"], a:"Verde"},
            {q:"¿En qué año se hundió el Titanic?", o:["1912","1905","1920"], a:"1912"},
            {q:"¿Cuántos colores tiene el arcoíris?", o:["7","6","8"], a:"7"},
            {q:"¿Día tiene 86.400...?", o:["Segundos","Minutos","Milisegundos"], a:"Segundos"},
            {q:"¿Pintó la Mona Lisa?", o:["Da Vinci","Picasso","Van Gogh"], a:"Da Vinci"},
            {q:"¿Capital de Italia?", o:["Roma","Milán","Nápoles"], a:"Roma"},
            {q:"¿Escritor de Hamlet?", o:["Shakespeare","Cervantes","Dante"], a:"Shakespeare"},
            {q:"¿Satélite natural de la Tierra?", o:["Luna","Europa","Titán"], a:"Luna"},
            {q:"¿Gas necesario para respirar?", o:["Oxígeno","Nitrógeno","Argón"], a:"Oxígeno"},
            {q:"¿Cuántas patas tiene una araña?", o:["8","6","10"], a:"8"},
            {q:"¿Océano más grande?", o:["Pacífico","Atlántico","Índico"], a:"Pacífico"},
            {q:"¿Metal líquido a temp. ambiente?", o:["Mercurio","Hierro","Plomo"], a:"Mercurio"},
            {q:"¿País del Sol Naciente?", o:["Japón","China","Corea"], a:"Japón"},
            {q:"¿Símbolo del Oro?", o:["Au","Ag","Fe"], a:"Au"},
            {q:"¿Continente de las pirámides?", o:["África","Asia","América"], a:"África"},
            {q:"¿Raíz cuadrada de 144?", o:["12","14","11"], a:"12"},
            {q:"¿H2O es fórmula de?", o:["Agua","Aire","Sal"], a:"Agua"},
            {q:"¿Descubrió la gravedad?", o:["Newton","Einstein","Galileo"], a:"Newton"},
            {q:"¿País de la pizza?", o:["Italia","Grecia","México"], a:"Italia"},
            {q:"¿Cuántos meses tienen 28 días?", o:["Todos","1","4"], a:"Todos"},
            {q:"¿Rey del Rock & Roll?", o:["Elvis Presley","M. Jackson","Chuck Berry"], a:"Elvis Presley"}
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function cargarJuego() {
            document.getElementById('status-overlay').style.display = 'none';
            document.getElementById('coin-count').innerText = monedas;
            document.getElementById('level-count').innerText = nivel;

            if (indexActual >= bancoPreguntas.length) {
                alert("¡MAESTRO! Has dominado la trivia.");
                reiniciar(); return;
            }
            
            const item = bancoPreguntas[indexActual];
            document.getElementById('question-box').innerText = item.q;
            
            let opciones = [...item.o];
            shuffle(opciones);
            
            const cont = document.getElementById('options-cont');
            cont.innerHTML = "";
            opciones.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = "option";
                btn.innerHTML = `<div class="option-letter">${letras[i]}</div> <span>${txt}</span>`;
                btn.onclick = () => procesar(txt);
                cont.appendChild(btn);
            });
            iniciarContador();
        }

        function iniciarContador() {
            clearInterval(reloj); 
            porcentajeTiempo = 100;
            const barra = document.getElementById('timer-bar');
            barra.style.backgroundColor = "var(--neon-yellow)";
            reloj = setInterval(() => {
                porcentajeTiempo -= 1;
                barra.style.width = porcentajeTiempo + "%";
                if (porcentajeTiempo < 35) barra.style.backgroundColor = "var(--neon-red)";
                if (porcentajeTiempo <= 0) { 
                    clearInterval(reloj); 
                    perderMonedas(20, "¡TIEMPO AGOTADO!"); 
                }
            }, 100); 
        }

        function procesar(seleccionTxt) {
            clearInterval(reloj);
            if (seleccionTxt === bancoPreguntas[indexActual].a) {
                ganarMonedas(10);
            } else {
                perderMonedas(20, "¡INCORRECTO!");
            }
        }

        function ganarMonedas(cant) {
            monedas += cant;
            nivel++;
            mostrarStatus(true, "¡CORRECTO!", `+${cant} Monedas`);
        }

        function perderMonedas(cant, titulo) {
            monedas -= cant;
            if(monedas < 0) monedas = 0;
            document.getElementById('coin-count').innerText = monedas;

            if (monedas <= 0) {
                mostrarDerrotaTotal();
            } else {
                mostrarStatus(false, titulo, `-${cant} Monedas`);
            }
        }

        function mostrarDerrotaTotal() {
            const overlay = document.getElementById('status-overlay');
            const icon = document.getElementById('status-icon');
            const txt = document.getElementById('status-text');
            const rew = document.getElementById('reward-text');
            const btn = document.getElementById('status-btn');

            overlay.style.display = 'flex';
            icon.innerHTML = "🤡";
            icon.className = "icon-anim";
            txt.innerHTML = "<span class='clown-msg'>GAME OVER<br>Te has quedado sin monedas</span>";
            txt.style.color = "var(--neon-red)";
            rew.innerText = "TU PROGRESO SE HA PERDIDO";
            
            btn.innerText = "REINTENTAR DESDE CERO";
            btn.className = "btn-action btn-retry";
            btn.style.display = 'block';
            btn.onclick = reiniciar;
        }

        function mostrarStatus(esExito, texto, recompensa) {
            const overlay = document.getElementById('status-overlay');
            const icon = document.getElementById('status-icon');
            const txt = document.getElementById('status-text');
            const rew = document.getElementById('reward-text');
            const btn = document.getElementById('status-btn');

            overlay.style.display = 'flex';
            btn.style.display = 'block';
            txt.innerText = texto;
            txt.style.color = esExito ? "var(--neon-green)" : "var(--neon-red)";
            rew.innerText = recompensa;

            if(esExito) {
                icon.innerHTML = "✔️"; icon.className = "icon-anim check-icon";
                btn.innerText = "SIGUIENTE NIVEL"; btn.className = "btn-action btn-next";
                btn.onclick = () => { indexActual++; cargarJuego(); };
            } else {
                icon.innerHTML = "❌"; icon.className = "icon-anim cross-icon";
                btn.innerText = "VOLVER A INTENTAR"; btn.className = "btn-action btn-retry";
                btn.onclick = cargarJuego; 
            }
        }

        function reiniciar() { 
            monedas = 50;
            indexActual = 0; 
            nivel = 1;
            shuffle(bancoPreguntas);
            cargarJuego(); 
        }
        
        function getExtraTime() { 
            window.open(linkAds, '_blank'); 
            // Reiniciar el tiempo al 100% como recompensa inmediata
            porcentajeTiempo = 100; 
            const barra = document.getElementById('timer-bar');
            barra.style.width = "100%";
            barra.style.backgroundColor = "var(--neon-yellow)";
        }

        shuffle(bancoPreguntas);
        cargarJuego();
    </script>
</body>
</html>
