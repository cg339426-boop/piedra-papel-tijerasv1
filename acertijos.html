<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>ACERTIJOS 🧠</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7000ff;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --ad-height: 60px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            padding-bottom: calc(var(--ad-height) + 20px);
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .game-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 25px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            margin-top: 15px;
            z-index: 2;
        }

        h1 { 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.7rem;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .level-tag { 
            background: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            margin-bottom: 15px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.4);
        }

        #riddle-text {
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 20px;
            min-height: 60px;
            font-weight: 500;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .slot {
            width: 35px;
            height: 42px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--primary);
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
            cursor: pointer;
            transition: 0.2s;
        }

        .slot:empty { border-color: rgba(255,255,255,0.2); }

        .main-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 900;
            font-size: 1rem;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.3);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .ad-btn {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            padding: 10px;
            width: 100%;
            font-size: 0.85rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .keyboard {
            display: grid;
            gap: 8px;
            width: 100%;
            margin-top: 10px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            flex: 1;
            max-width: 36px;
            height: 45px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .key:active { 
            background: var(--primary); 
            color: #000; 
            transform: scale(0.9); 
            border-color: var(--primary);
        }

        .ad-container-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--ad-height);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* Modales */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 20, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            border: 2px solid var(--primary);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        }

        .modal-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>ACERTIJOS 🧠</h1>
        <span class="level-tag" id="level-display">FASE 1</span>
        
        <p id="riddle-text">Cargando...</p>
        
        <div class="slots" id="letter-slots"></div>

        <button class="main-btn" onclick="checkAnswer()">COMPROBAR</button>
        <button class="ad-btn" onclick="getHelp()">💡 REVELAR PISTA (ADS)</button>

        <div class="keyboard">
            <div class="kb-row">
                <div class="key" onclick="press('Q')">Q</div>
                <div class="key" onclick="press('W')">W</div>
                <div class="key" onclick="press('E')">E</div>
                <div class="key" onclick="press('R')">R</div>
                <div class="key" onclick="press('T')">T</div>
                <div class="key" onclick="press('Y')">Y</div>
                <div class="key" onclick="press('U')">U</div>
                <div class="key" onclick="press('I')">I</div>
                <div class="key" onclick="press('O')">O</div>
                <div class="key" onclick="press('P')">P</div>
            </div>
            <div class="kb-row">
                <div class="key" onclick="press('A')">A</div>
                <div class="key" onclick="press('S')">S</div>
                <div class="key" onclick="press('D')">D</div>
                <div class="key" onclick="press('F')">F</div>
                <div class="key" onclick="press('G')">G</div>
                <div class="key" onclick="press('H')">H</div>
                <div class="key" onclick="press('J')">J</div>
                <div class="key" onclick="press('K')">K</div>
                <div class="key" onclick="press('L')">L</div>
                <div class="key" onclick="press('Ñ')">Ñ</div>
            </div>
            <div class="kb-row">
                <div class="key" onclick="press('Z')">Z</div>
                <div class="key" onclick="press('X')">X</div>
                <div class="key" onclick="press('C')">C</div>
                <div class="key" onclick="press('V')">V</div>
                <div class="key" onclick="press('B')">B</div>
                <div class="key" onclick="press('N')">N</div>
                <div class="key" onclick="press('M')">M</div>
                <div class="key" style="max-width: 60px; font-size: 0.8rem;" onclick="deleteLast()">BORRAR</div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0; color: var(--primary);"></h2>
            <p id="modal-msg" style="font-size: 1.1rem;"></p>
            <button id="modal-action-btn" class="modal-btn">CONTINUAR</button>
        </div>
    </div>

    <div class="ad-container-fixed">
        <div style="color: #444; font-size: 10px;">BANNER AD 320x50</div>
    </div>

<script>
    const originalRiddles = [
        { q: "¿Qué tiene llaves pero no abre ninguna cerradura?", a: "PIANO", h: "Tiene muchas notas blancas y negras." },
        { q: "Siempre estoy en camino, pero nunca llego. ¿Qué soy?", a: "MAÑANA", h: "Es el día que sigue al de hoy." },
        { q: "¿Qué es lo que puedes romper, incluso si nunca lo tocas?", a: "PROMESA", h: "Se hace con la palabra y el compromiso." },
        { q: "Cuanto más le quitas, más grande se vuelve. ¿Qué es?", a: "AGUJERO", h: "Puede estar en la tierra o en un calcetín." },
        { q: "¿Qué tiene un ojo pero no puede ver?", a: "AGUJA", h: "Se usa para coser ropa." },
        { q: "¿Qué tiene manos pero no puede aplaudir?", a: "RELOJ", h: "Marca las horas y los minutos." },
        { q: "Lo compras para comer, pero nunca te lo comes. ¿Qué es?", a: "PLATO", h: "Es donde sirves la comida." },
        { q: "Si me tienes, quieres compartirme. Si me compartes, ya no me tienes.", a: "SECRETO", h: "Algo que se cuenta al oído." },
        { q: "¿Qué sube pero nunca baja?", a: "EDAD", h: "Cumples años cada vez que pasa un año." },
        { q: "¿Qué es lo que tiene un montón de dientes pero nunca muerde?", a: "PEINE", h: "Lo usas para arreglarte el cabello." }
        // ... (agrega aquí el resto de tus 50 acertijos)
    ];

    let riddles = [...originalRiddles];
    let currentLevel = 0;
    let userEntry = [];
    const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function showModal(title, msg, btnText, callback) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        const btn = document.getElementById('modal-action-btn');
        btn.innerText = btnText;
        btn.onclick = () => { closeModal(); if(callback) callback(); };
        document.getElementById('custom-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
    }

    function loadRiddle() {
        if (currentLevel >= riddles.length) {
            showModal("¡INCREÍBLE!", "Has superado todos los niveles.", "REINICIAR", () => {
                currentLevel = 0;
                shuffle(riddles);
                loadRiddle();
            });
            return;
        }
        document.getElementById('level-display').innerText = "FASE " + (currentLevel + 1);
        document.getElementById('riddle-text').innerText = riddles[currentLevel].q;
        userEntry = new Array(riddles[currentLevel].a.length).fill("");
        renderSlots();
    }

    function renderSlots() {
        const container = document.getElementById('letter-slots');
        container.innerHTML = "";
        userEntry.forEach((char, index) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerText = char;
            slot.onclick = () => {
                userEntry[index] = "";
                renderSlots();
            };
            container.appendChild(slot);
        });
    }

    function press(key) {
        const emptyIndex = userEntry.indexOf("");
        if (emptyIndex !== -1) {
            userEntry[emptyIndex] = key;
            renderSlots();
        }
    }

    function deleteLast() {
        for (let i = userEntry.length - 1; i >= 0; i--) {
            if (userEntry[i] !== "") {
                userEntry[i] = "";
                break;
            }
        }
        renderSlots();
    }

    function checkAnswer() {
        if (userEntry.join("") === riddles[currentLevel].a) {
            showModal("CORRECTO", "¡Excelente deducción!", "SIGUIENTE NIVEL", nextLevel);
        } else {
            showModal("UPS...", "Esa no es la respuesta correcta. ¡Inténtalo de nuevo!", "VOLVER", null);
        }
    }

    function nextLevel() {
        currentLevel++;
        loadRiddle();
    }

    function getHelp() {
        window.open(smartlink, '_blank');
        showModal("CARGANDO PISTA", "Analizando datos... la pista aparecerá en breve.", "OK", null);
        setTimeout(() => {
            showModal("PISTA REVELADA", riddles[currentLevel].h, "ENTENDIDO", null);
        }, 4000);
    }

    shuffle(riddles);
    loadRiddle();
</script>
</body>
</html>
