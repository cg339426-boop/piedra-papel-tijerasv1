<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUEGOS 🎮 - HUB</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* TÍTULO ACTUALIZADO SEGÚN TU PUNTO 1 */
        .logo {
            font-size: 3.2rem;
            text-transform: uppercase;
            color: white;
            text-shadow: 3px 3px var(--neon-blue), -3px -3px var(--neon-pink);
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-align: center;
            line-height: 1;
        }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 85%;
            max-width: 400px;
        }

        .game-card {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid #333;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        /* Colores de bordes para que resalten */
        .card-ppt { border-color: #ffcc00; }
        .card-tetris { border-color: var(--neon-blue); }
        .card-flappy { border-color: #00ff88; }

        .game-card:active { transform: scale(0.95); background: #222; }

        /* SECCIÓN CREADOR */
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 1px;
        }

        .creator-link {
            display: block;
            margin-top: 12px;
            color: var(--neon-pink);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        /* VENTANA EMERGENTE (MODAL) */
        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: #111;
            border: 2px solid var(--neon-pink);
            padding: 30px;
            border-radius: 25px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 90;
        }

        .btn-close {
            margin-top: 25px;
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .contact-info {
            margin: 15px 0;
            font-family: 'Arial', sans-serif;
            color: #ddd;
        }

        .contact-info strong { color: var(--neon-blue); display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- PUNTO 1: Nombre cambiado -->
    <div class="logo">JUEGOS 🎮<br><span style="font-size: 1.1rem; color: var(--neon-blue); letter-spacing: 2px;">GAMING ZONE</span></div>

    <div class="menu-container">
        
        <a href="ppt.html" class="game-card card-ppt">
            <span style="font-size: 3rem;">✊</span>
            <span>PIEDRA, PAPEL, TIJERA</span>
           <span>juega con un amigo</span>
            <span>▶️</span>
        </a>

        <!-- PUNTO 2: Nombre cambiado a TETRIS 💣 -->
        <a href="tetris.html" class="game-card card-tetris">
            <span style="font-size: 3rem;">👀</span>
            <span>NUMERO LOCO🔍</span>
            <span>▶️</span>
        </a>

        <!-- PUNTO 3: Nombre cambiado a FLAPPY -->
        <a href="flappy.html" class="game-card card-flappy">
            <span style="font-size: 3rem;">🧠</span>
            <span>MEMORIA🧠</span>
            <span>▶️</span>
        </a>

    </div>

    <!-- PUNTO 4: Sección del creador -->
    <div class="footer">
        DESARROLLADO PARA GANAR 🚀
        <div class="creator-link" onclick="toggleModal(true)">ACERCA DEL CREADOR</div>
    </div>

    <!-- PANTALLA DE CONTACTO -->
    <div id="overlay" onclick="toggleModal(false)"></div>
    <div id="modal">
        <h3 style="color: var(--neon-pink); margin-top: 0;">INFO DEL PROGRAMADOR</h3>
        
        <div class="contact-info">
            📧 CORREO:
            <strong>tu-correo@ejemplo.com</strong>
        </div>
        
        <div class="contact-info">
            📱 WHATSAPP:
            <strong>+58 000 000 0000</strong>
        </div>

        <button class="btn-close" onclick="toggleModal(false)">VOLVER AL MENÚ</button>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'block' : 'none';
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }
    </script>

</body>
</html>
