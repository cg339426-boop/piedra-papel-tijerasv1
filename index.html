<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>JUEGOS 🎮 - LOBBY</title>
    <style>
        :root {
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            /* Colores Neón */
            --n-yellow: #ffcc00;
            --n-blue: #00d4ff;
            --n-green: #00ff88;
            --n-purple: #a855f7;
            --n-pink: #f43f5e;
            --n-red: #ff3131;
            /* Altura ajustada para el banner 320x50 */
            --ad-height: 60px;
        }

        body {
            background: radial-gradient(circle at top, #111, #000);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Espacio para que el banner no tape el botón de creador */
            padding-bottom: calc(var(--ad-height) + 10px);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 900;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 450px;
            padding-bottom: 20px;
        }

        .game-card {
            background: var(--glass);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-card:active { transform: scale(0.9); }

        /* Colores Neón */
        .neon-yellow { border-color: var(--n-yellow); box-shadow: 0 0 15px rgba(255,204,0,0.3); }
        .neon-blue   { border-color: var(--n-blue);   box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .neon-green  { border-color: var(--n-green);  box-shadow: 0 0 15px rgba(0,255,136,0.3); }
        .neon-purple { border-color: var(--n-purple); box-shadow: 0 0 15px rgba(168,85,247,0.3); }
        .neon-pink   { border-color: var(--n-pink);   box-shadow: 0 0 15px rgba(244,63,94,0.3); }
        .neon-red    { border-color: var(--n-red);    box-shadow: 0 0 15px rgba(255,49,49,0.3); }

        .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

        .game-title {
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
        }

        .btn-creator {
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- CONTENEDOR FIJO PARA EL ANUNCIO 320x50 --- */
        .ad-footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--ad-height);
            background: #000;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid var(--n-blue);
            text-align: center;
            width: 80%;
            max-width: 320px;
        }

        .close-btn {
            margin-top: 20px;
            background: var(--n-blue);
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <header>
        <h1>JUEGOS 🎮</h1>
    </header>

    <main class="grid-container">
        <a href="trivia.html" class="game-card neon-yellow">
            <span class="icon">⚡</span>
            <span class="game-title">Trivia Flash</span>
        </a>
        <a href="numero.html" class="game-card neon-blue">
            <span class="icon">🔢</span>
            <span class="game-title">Número Loco</span>
        </a>
        <a href="acertijos.html" class="game-card neon-green">
            <span class="icon">🧠</span>
            <span class="game-title">Acertijos</span>
        </a>
        <a href="puzzle.html" class="game-card neon-purple">
            <span class="icon">🧩</span>
            <span class="game-title">Puzzle Keys</span>
        </a>
        <a href="memoria.html" class="game-card neon-pink">
            <span class="icon">🏞️</span>
            <span class="game-title">Memoria</span>
        </a>
        <a href="ppt.html" class="game-card neon-red">
            <span class="icon">✊</span>
            <span class="game-title">Piedra papel tijeras</span>
        </a>
    </main>

    <footer>
        <button class="btn-creator" onclick="toggleModal(true)">Acerca del creador</button>
    </footer>

    <div class="ad-footer-fixed">
        <script type="text/javascript">
            atOptions = {
                'key' : '20622febebc58aceaadca806e30f7816',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/20622febebc58aceaadca806e30f7816/invoke.js"></script>
    </div>

    <div id="creatorModal" class="modal">
        <div class="modal-content">
            <h3>CONTACTO</h3>
            <p>📧 Correo: @gmail.com</p>
            <p>📱 WhatsApp: *****</p>
            <button class="close-btn" onclick="toggleModal(false)">CERRAR</button>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('creatorModal').style.display = show ? 'flex' : 'none';
        }
    </script>

</body>
</html>
