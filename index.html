<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUEGOS 🎮 - HUB</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #a855f7;
            --neon-green: #00ff88;
            --neon-yellow: #ffcc00;
            --neon-orange: #ff6600;
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
            padding: 20px 0;
        }

        .logo {
            font-size: 2.5rem;
            text-transform: uppercase;
            color: white;
            text-shadow: 3px 3px var(--neon-blue), -3px -3px var(--neon-pink);
            margin-bottom: 30px;
            letter-spacing: 5px;
            text-align: center;
            line-height: 1;
        }

        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 450px;
        }

        .game-card {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 2px solid #333;
            padding: 20px 10px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            aspect-ratio: 1/1;
        }

        .game-card span:nth-child(2) {
            font-size: 0.75rem;
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Bordes actualizados según la nueva posición */
        .card-ahorcado-mini { border-color: var(--neon-yellow); } 
        .card-num { border-color: var(--neon-blue); }
        .card-puzzle { border-color: var(--neon-purple); }
        .card-memoria { border-color: var(--neon-green); }
        .card-ppt-big { border-color: var(--neon-orange); }

        .full-width {
            grid-column: span 2;
            aspect-ratio: auto;
            height: 130px; /* Un poco más de altura para el texto extra */
        }

        .game-card:active { transform: scale(0.95); background: #222; }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 1px;
        }

        .creator-link {
            display: block;
            margin-top: 10px;
            color: var(--neon-pink);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: #111;
            border: 2px solid var(--neon-pink);
            padding: 30px;
            border-radius: 25px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 90;
        }

        .btn-close {
            margin-top: 25px;
            background: none;
            border: 1px solid #555;
            color: #888;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .contact-info {
            margin: 15px 0;
            font-family: 'Arial', sans-serif;
            color: #ddd;
            font-size: 0.9rem;
        }

        .contact-info strong { color: var(--neon-blue); display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="logo">JUEGOS 🎮<br><span style="font-size: 1rem; color: var(--neon-blue); letter-spacing: 2px;">GAMING ZONE</span></div>

    <div class="menu-container">
        
        <a href="ahorcado.html" class="game-card card-ahorcado-mini">
            <span style="font-size: 2.5rem;">💀</span>
            <span>AHORCADO PRO</span>
            <span style="font-size: 1rem; margin-top:5px;">▶️</span>
        </a>

        <a href="tetris.html" class="game-card card-num">
            <span style="font-size: 2.5rem;">👀</span>
            <span>ENCUENTRA EL NÚMERO</span>
            <span style="font-size: 1rem; margin-top:5px;">▶️</span>
        </a>

        <a href="puzzle.html" class="game-card card-puzzle">
            <span style="font-size: 2.5rem;">🧩</span>
            <span>PUZZLE LOCO</span>
            <span style="font-size: 1rem; margin-top:5px;">▶️</span>
        </a>

        <a href="memoria.html" class="game-card card-memoria">
            <span style="font-size: 2.5rem;">🧠</span>
            <span>MEMORIA ELITE</span>
            <span style="font-size: 1rem; margin-top:5px;">▶️</span>
        </a>

        <a href="ppt.html" class="game-card card-ppt-big full-width">
            <span style="font-size: 2.5rem;">✊</span>
            <span>PIEDRA, PAPEL, TIJERA</span>
            <span style="font-size: 0.85rem; color: var(--neon-blue); margin-top:4px;">¡JUEGA CON UN AMIGO! 👥</span>
            <span style="font-size: 1rem; margin-top:5px;">▶️</span>
        </a>

    </div>

    <div class="footer">
        DESARROLLADO PARA GANAR 🚀
        <div class="creator-link" onclick="toggleModal(true)">ACERCA DEL CREADOR</div>
    </div>

    <div id="overlay" onclick="toggleModal(false)"></div>
    <div id="modal">
        <h3 style="color: var(--neon-pink); margin-top: 0;">INFO DEL PROGRAMADOR</h3>
        <div class="contact-info">
            📱 CONTACTO:
            <strong>TU NOMBRE AQUÍ</strong>
        </div>
        <div class="contact-info">
            📱 WHATSAPP:
            <strong>+58 000 000 0000</strong>
        </div>
        <button class="btn-close" onclick="toggleModal(false)">VOLVER AL MENÚ</button>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'block' : 'none';
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }
    </script>

</body>
</html>
