<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e14">
    <title>PIEDRA PAPEL TIJERAS - EL PARLEY</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #e94560;
            --gold: #ffd700;
            --win: #00ff88;
            --electric-blue: #0044ff;
        }

        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 0;
            overflow: hidden;
        }

        .screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        #screen-home { background-color: var(--electric-blue); justify-content: space-around; padding: 40px 10px; }
        .home-title { font-size: 2.5rem; font-weight: 900; color: var(--gold); text-shadow: 2px 2px 10px #000; }
        .home-emojis .hand { font-size: 6rem; filter: drop-shadow(0 0 10px white); }

        .btn-main {
            background: var(--accent);
            color: white; border: 3px solid white;
            padding: 15px 40px; font-size: 1.4rem;
            font-weight: bold; border-radius: 50px;
        }
        .btn-back {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.1); color: white;
            padding: 8px 12px; border-radius: 5px; z-index: 2000; border: 1px solid #444;
        }

        #game-ui { display: none; padding-top: 10px; height: 100vh; background: var(--bg); }
        .stats-bar {
            background: #1a1a2e; padding: 12px;
            margin: 5px 20px; border-radius: 15px;
            border: 1px solid var(--gold);
        }
        #balance { color: var(--win); font-size: 2rem; font-weight: bold; }

        .game-zone {
            height: 180px; display: flex; flex-direction: column;
            justify-content: center; background: #16213e;
            border-radius: 25px; margin: 10px 20px;
            border: 2px solid #0f3460;
        }

        /* ANIMACIÓN DE PUÑOS */
        @keyframes shakeHand {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(-15deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .animating-hand {
            display: inline-block;
            font-size: 4rem;
            animation: shakeHand 0.4s infinite;
        }
        .text-ganaste { color: #00ff88; font-weight: 900; }
        .text-perdiste { color: #ff4444; font-weight: 900; }
        .emoji-grande { font-size: 3.5rem; margin: 10px 0; }

        .choices-container { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .choice-btn { 
            font-size: 35px; background: #1a1a2e; 
            border: 2px solid transparent; border-radius: 15px; padding: 10px; 
        }
        .choice-btn.selected { border-color: var(--gold); background: #0f3460; transform: scale(1.1); }

        /* BOTÓN APOSTAR CENTRADO */
        #action-btn {
            background: var(--win); color: #000;
            font-weight: 900; font-size: 1.4rem;
            width: 90%; padding: 18px;
            border: none; border-radius: 50px; cursor: pointer;
            display: block; margin: 10px auto;
        }
        #action-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        #btn-recarga {
            display: none; background: var(--gold); color: #000;
            width: 90%; padding: 18px; font-weight: 900;
            font-size: 1rem; text-transform: uppercase;
            border-radius: 50px; border: 2px solid #000;
            margin: 10px auto;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* INPUT DE APUESTA GRANDE */
        .bet-area { margin: 15px 0; font-size: 1.2rem; font-weight: bold; }
        #bet-amount {
            width: 100px; height: 45px; font-size: 1.6rem; 
            background: #1a1a2e; color: white; 
            border: 2px solid var(--gold); border-radius: 10px;
            text-align: center; font-weight: bold;
        }

        .chat-container {
            background: #0b0e14; height: 130px;
            margin: 10px 20px; border-radius: 15px;
            display: flex; flex-direction: column; border: 1px solid #333;
        }
        #chat-messages { flex-grow: 1; overflow-y: auto; text-align: left; padding: 8px; font-size: 0.8rem; }
        .chat-input-area { display: flex; padding: 5px; background: #1a1a2e; border-radius: 0 0 15px 15px; }
        #chat-input { flex-grow: 1; background: transparent; border: none; color: white; padding: 8px; outline: none; }
        #chat-send { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen">
        <h1 class="home-title">💵 PIEDRA PAPEL<br>TIJERAS 💵</h1>
        <div class="home-emojis"><div class="hand">✋✊✌️</div></div>
        <h2 style="color:white">JUEGA! O TAS CAGAO.</h2>
        <button class="btn-main" onclick="showMenu()">JUGAR</button>
    </div>

    <div id="screen-menu" class="screen" style="display: none; background: var(--bg);">
        <button class="btn-back" onclick="showHome()">⬅ VOLVER</button>
        <button class="btn-main" onclick="startSolo()" style="margin-bottom: 20px; background:#444;">SOLO (CONTRA PC)</button>
        <button class="btn-main" onclick="showMultiSetup()" style="background:var(--electric-blue)">CON UN AMIGO</button>
    </div>

    <div id="screen-multi-setup" class="screen" style="display: none; background: var(--bg);">
        <button class="btn-back" onclick="showMenu()">⬅ VOLVER</button>
        <div style="background: #1a1a2e; padding: 25px; border-radius: 20px; border: 1px solid var(--gold);">
            <h3>¿CÓMO TE LLAMAS?</h3>
            <input type="text" id="player-name" placeholder="TU APODO" style="padding: 10px; text-align: center; border-radius: 10px; width: 80%; margin-bottom: 15px;">
            <h3>CÓDIGO DE SALA</h3>
            <input type="text" id="room-id" placeholder="EJ: 777" style="padding: 12px; text-align: center; border-radius: 10px; width: 80%;">
            <br><br>
            <button class="btn-main" onclick="startMulti()">CONECTAR</button>
        </div>
    </div>

    <div id="game-ui">
        <button class="btn-back" onclick="salirConAnuncio()">SALIR</button>
        <div class="stats-bar">
            <div id="balance">💵 $<span id="money">2000</span></div>
            <div id="player-info" style="font-size: 0.8rem; color: var(--gold); margin-top:5px;"></div>
        </div>
        
        <div class="game-zone" id="display">
            <div id="timer" style="font-size: 4rem;">🌐</div>
            <div id="status-text" style="color:var(--gold)">ESPERANDO...</div>
        </div>
        
        <div class="choices-container">
            <button class="choice-btn" id="btn-piedra" onclick="selectChoice('piedra')">✊</button>
            <button class="choice-btn" id="btn-papel" onclick="selectChoice('papel')">✋</button>
            <button class="choice-btn" id="btn-tijera" onclick="selectChoice('tijera')">✌️</button>
        </div>
        
        <div class="bet-area">
            APUESTA: $<input type="number" id="bet-amount" value="500" step="100">
        </div>
        
        <button id="action-btn" onclick="handleAction()" disabled>CARGANDO...</button>
        <button id="btn-recarga" onclick="recargarDinero()">¿PELAO? DALE AQUÍ Y RECARGA 2000$ 💸</button>

        <div class="chat-container">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Dile algo...">
                <button id="chat-send" onclick="sendChatMessage()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyABXFpDsl2Q1Iz6V97FEKHxBho",
            databaseURL: "https://juego-piedra-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let money = 2000;
        let playerChoice = "";
        let myName = "Jugador";
        let rivalName = "Oponente";
        let gameState = "loading";
        let currentRoom = null;
        let isMultiplayer = false;
        let playerNumber = 1;
        
        const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";

        function salirConAnuncio() {
            window.open(smartlink, '_blank');
            location.reload();
        }

        function hideAll() { document.querySelectorAll('.screen').forEach(s => s.style.display = 'none'); document.getElementById('game-ui').style.display = 'none'; }
        function showHome() { hideAll(); document.getElementById('screen-home').style.display = 'flex'; }
        function showMenu() { hideAll(); document.getElementById('screen-menu').style.display = 'flex'; }
        function showMultiSetup() { hideAll(); document.getElementById('screen-multi-setup').style.display = 'flex'; }

        function startSolo() {
            let n = prompt("¿Cómo te llamas, mano?", "El Chamo");
            myName = n || "Jugador";
            isMultiplayer = false; hideAll(); document.getElementById('game-ui').style.display = 'block';
            document.getElementById('player-info').innerText = myName + " vs PC";
            document.getElementById('status-text').innerText = "MODO SOLITARIO";
            checkMoney();
            gameState = "idle";
        }

        function startMulti() {
            const roomName = document.getElementById('room-id').value.trim();
            const inputName = document.getElementById('player-name').value.trim();
            if(!roomName || !inputName) return alert("¡Pon tu nombre y el código!");
            myName = inputName; isMultiplayer = true; currentRoom = roomName;
            hideAll(); document.getElementById('game-ui').style.display = 'block';
            const roomRef = db.ref('rooms/' + currentRoom);
            roomRef.once('value', (snap) => {
                if(!snap.val()) { playerNumber = 1; roomRef.set({ status: "waiting", p1_name: myName, p2_name: "Esperando...", p1_choice: "", p2_choice: "" }); }
                else { playerNumber = 2; roomRef.update({ status: "ready", p2_name: myName, p1_choice: "", p2_choice: "" }); }
            });
            roomRef.on('value', (snap) => {
                const data = snap.val(); if(!data) return;
                rivalName = (playerNumber === 1) ? data.p2_name : data.p1_name;
                document.getElementById('player-info').innerText = `${myName} vs ${rivalName}`;
                if(data.status === "ready") {
                    document.getElementById('status-text').innerText = "¡LISTOS PA' LA PELEA!";
                    checkMoney();
                    if(gameState === "loading") gameState = "idle";
                }
                const rivalNum = (playerNumber === 1) ? 2 : 1;
                if(data[`p${rivalNum}_choice`] && (gameState === "idle" || gameState === "counting")) {
                    document.getElementById('status-text').innerText = `¡${rivalName} YA LANZÓ! 🤜`;
                }
                if(data.p1_choice && data.p2_choice) processMultiResult(data.p1_choice, data.p2_choice);
            });
        }

        function checkMoney() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if(money < bet) {
                document.getElementById('action-btn').style.display = 'none';
                document.getElementById('btn-recarga').style.display = 'block';
            } else {
                document.getElementById('action-btn').style.display = 'block';
                document.getElementById('action-btn').disabled = false;
                document.getElementById('action-btn').innerText = "APOSTAR";
                document.getElementById('btn-recarga').style.display = 'none';
            }
        }

        function recargarDinero() {
            window.open(smartlink, '_blank'); 
            money += 500; 
            document.getElementById('money').innerText = money;
            checkMoney();
        }

        function handleAction() {
            if(gameState === "idle") startRound();
            else if(gameState === "result") resetToIdle();
        }

        function startRound() {
            const bet = parseInt(document.getElementById('bet-amount').value);
            if (bet > money) return checkMoney();
            gameState = "counting";
            document.getElementById('action-btn').disabled = true;
            let c = 3;
            const t = setInterval(() => {
                document.getElementById('display').innerHTML = `
                    <div style="display:flex; justify-content:center; gap:25px; margin-bottom:10px;">
                        <div class="animating-hand">✊</div>
                        <div class="animating-hand" style="transform: scaleX(-1);">✊</div>
                    </div>
                    <div style="font-size:3.5rem; color:var(--gold); font-weight:900;">${c === 0 ? "¡YA!" : c}</div>
                `;
                c--;
                if(c < -1) { 
                    clearInterval(t); 
                    if(isMultiplayer) sendChoice(); 
                    else showSoloResult(bet); 
                }
            }, 800);
        }

        function sendChoice() {
            const choice = playerChoice || "piedra";
            const up = {}; up[`p${playerNumber}_choice`] = choice;
            db.ref('rooms/' + currentRoom).update(up);
            document.getElementById('status-text').innerText = "ESPERANDO A " + rivalName;
            gameState = "waiting_rival";
        }

        function processMultiResult(p1, p2) {
            if(gameState !== "waiting_rival" && gameState !== "counting") return;
            const mine = (playerNumber === 1) ? p1 : p2;
            const enemy = (playerNumber === 1) ? p2 : p1;
            const bet = parseInt(document.getElementById('bet-amount').value);
            const emojis = { piedra: '✊', papel: '✋', tijera: '✌️' };
            let res = (mine === enemy) ? 0 : ((mine==='piedra'&&enemy==='tijera')||(mine==='papel'&&enemy==='piedra')||(mine==='tijera'&&pc==='papel')) ? 1 : 2;
            if(res === 1) money += bet; else if(res === 2) money -= bet;
            showFinalDisplay(res, emojis[mine], emojis[enemy]);
            if(playerNumber === 1) setTimeout(() => db.ref('rooms/' + currentRoom).update({ p1_choice: "", p2_choice: "" }), 3000);
        }

        function showSoloResult(bet) {
            const opts = ['piedra', 'papel', 'tijera'];
            const mine = playerChoice || 'piedra';
            let pc;
            
            // PROBABILIDAD AL 50%
            if(Math.random() < 0.50) { 
                if(mine === 'piedra') pc = 'papel';
                else if(mine === 'papel') pc = 'tijera';
                else pc = 'piedra';
            } else { pc = opts[Math.floor(Math.random()*3)]; }
            
            const emojis = { piedra: '✊', papel: '✋', tijera: '✌️' };
            let res = (mine === pc) ? 0 : ((mine==='piedra'&&pc==='tijera')||(mine==='papel'&&pc==='piedra')||(mine==='tijera'&&pc==='papel')) ? 1 : 2;
            if(res === 1) money += bet; else if(res === 2) money -= bet;
            showFinalDisplay(res, emojis[mine], emojis[pc]);
        }

        function showFinalDisplay(res, m, e) {
            document.getElementById('money').innerText = money;
            let contenido = "";
            if (res === 1) { 
                contenido = `<div class="text-ganaste" style="font-size:1.8rem;">GANASTE</div><div class="emoji-grande">😎</div><div class="text-ganaste" style="font-size:1.4rem;">DALE GUAYA!</div>`;
            } else if (res === 2) { 
                contenido = `<div class="text-perdiste" style="font-size:1.8rem;">PERDISTE</div><div class="emoji-grande">🤣</div><div class="text-perdiste" style="font-size:1.4rem;">PONTE PILAS!</div>`;
            } else { 
                contenido = `<div style="color:var(--gold); font-size:1.8rem; font-weight:900;">EMPATE</div><div class="emoji-grande">🤝</div><div style="color:var(--gold); font-size:1.2rem;">¡CASI LO LOGRAS!</div>`;
            }
            document.getElementById('display').innerHTML = contenido;
            gameState = "result";
            checkMoney();
            document.getElementById('action-btn').innerText = "OTRA RONDA";
        }

        function resetToIdle() {
            gameState = "idle";
            document.getElementById('display').innerHTML = '<div id="timer">🌐</div><div id="status-text" style="color:var(--gold)">LISTO PARA OTRA</div>';
            checkMoney();
            playerChoice = "";
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
        }

        function selectChoice(c) {
            playerChoice = c;
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-' + c).classList.add('selected');
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !currentRoom) return;
            db.ref('chats/' + currentRoom).push({ name: myName, text: input.value, p: playerNumber });
            input.value = "";
        }
    </script>
</body>
</html>
