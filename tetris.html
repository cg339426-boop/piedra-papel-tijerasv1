<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVOLUTION LUCK PRO - PROGRESSIVE</title>
    <style>
        :root {
            --bg: #050505;
            --neon-red: #ff3131;
            --neon-blue: #00d4ff;
            --premium-yellow: #ffcc00;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA DE TIEMPO EVOLUTIVA */
        .timer-container {
            width: 30%; /* Empieza pequeña */
            height: 14px;
            background: #222;
            margin-top: 20px;
            border-radius: 20px;
            border: 2px solid #444;
            overflow: hidden;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 49, 49, 0.2);
        }

        #progress-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        /* BARRA DE CUADRITOS DE ENERGÍA */
        .energy-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            width: 90%;
            height: 22px;
            margin-top: 15px;
        }

        .sq {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .sq.on {
            background: var(--neon-blue);
            box-shadow: 0 0 12px var(--neon-blue);
            border-color: #fff;
        }

        /* NÚMERO OBJETIVO */
        #target-num {
            font-size: 4.5rem;
            margin: 15px 0;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        /* GRILLA DE JUEGO */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 10px;
            width: 95vw;
            max-width: 380px;
        }

        .tile {
            aspect-ratio: 1;
            border-radius: 12px;
            border: none;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.6), inset 0 -3px 6px rgba(0,0,0,0.3);
            transition: transform 0.05s;
        }

        .tile:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.6); }

        .c1 { background: linear-gradient(145deg, #00c6ff, #0072ff); }
        .c2 { background: linear-gradient(145deg, #f953c6, #b91d73); }
        .c3 { background: linear-gradient(145deg, #f7971e, #ffd200); }
        .c4 { background: linear-gradient(145deg, #11998e, #38ef7d); }

        /* BOTÓN DE ANUNCIO PREMIUM */
        .btn-ad {
            margin-top: auto;
            margin-bottom: 25px;
            width: 90%;
            background: linear-gradient(180deg, #222, #000);
            border: 2px solid var(--premium-yellow);
            color: var(--premium-yellow);
            padding: 18px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
        }

        /* EFECTO DE FLASH AL SUBIR NIVEL */
        .flash { animation: flash-white 0.5s; }
        @keyframes flash-white {
            0% { background: #fff; }
            100% { background: var(--bg); }
        }
    </style>
</head>
<body id="game-body">

    <div class="timer-container" id="t-container">
        <div id="progress-bar"></div>
    </div>

    <div class="energy-grid">
        <div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div>
        <div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div><div class="sq"></div>
    </div>

    <div id="target-num">--</div>

    <div id="game-grid" class="grid"></div>

    <button class="btn-ad" onclick="watchAd()">👁️ MIRA DONDE ESTA</button>

<script>
    // VARIABLES DE ESTADO INICIAL
    let energy = 0;
    let targetNum = 0;
    let timeLeft = 100;
    let timerId;
    let barWidth = 30;       // % inicial del tamaño de la barra
    let dropSpeed = 0.6;     // Velocidad inicial
    const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";

    const grid = document.getElementById('game-grid');
    const targetDisplay = document.getElementById('target-num');
    const progress = document.getElementById('progress-bar');
    const tContainer = document.getElementById('t-container');
    const squares = document.querySelectorAll('.sq');

    function initRound() {
        grid.innerHTML = '';
        let nums = [];
        while(nums.length < 16) {
            let r = Math.floor(Math.random() * 90) + 10;
            if(!nums.includes(r)) nums.push(r);
        }
        targetNum = nums[Math.floor(Math.random() * nums.length)];
        targetDisplay.innerText = targetNum;

        nums.forEach(n => {
            const btn = document.createElement('button');
            btn.className = `tile c${Math.floor(Math.random() * 4) + 1}`;
            btn.innerText = n;
            btn.onclick = () => checkGuess(n, btn);
            grid.appendChild(btn);
        });
        startTimer();
    }

    function checkGuess(n, btn) {
        if(n === targetNum) {
            timeLeft = 100; // Reinicio instantáneo del tiempo al acertar
            energy++;
            updateEnergy();
            initRound();
        } else {
            energy = 0; // Penalización: vacía la barra de cuadros
            updateEnergy();
            btn.style.opacity = "0.2";
            btn.disabled = true;
        }
    }

    function updateEnergy() {
        squares.forEach((s, i) => {
            if(i < energy) s.classList.add('on');
            else s.classList.remove('on');
        });

        if(energy >= 10) {
            energy = 0;
            // PREMIO 1: La barra crece físicamente
            barWidth = Math.min(95, barWidth + 15);
            tContainer.style.width = barWidth + "%";
            
            // PREMIO/RETO 2: La velocidad aumenta para la siguiente racha
            dropSpeed += 0.15; 
            
            // Efecto visual de logro
            document.body.classList.add('flash');
            setTimeout(() => {
                document.body.classList.remove('flash');
                squares.forEach(s => s.classList.remove('on'));
            }, 500);
        }
    }

    function startTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft -= dropSpeed;
            progress.style.width = timeLeft + "%";

            if(timeLeft <= 0) {
                clearInterval(timerId);
                alert("¡SE ACABÓ EL TIEMPO! Racha finalizada.");
                resetGame();
            }
        }, 100);
    }

    function watchAd() {
        let startTime = Date.now();
        window.open(smartlink, '_blank');

        window.onfocus = function() {
            let duration = (Date.now() - startTime) / 1000;
            if (duration >= 6) {
                // REVELAR ubicación
                const tiles = document.querySelectorAll('.tile');
                tiles.forEach(t => {
                    if(parseInt(t.innerText) === targetNum) {
                        t.style.boxShadow = "0 0 25px #fff";
                        t.style.border = "4px solid white";
                        t.style.zIndex = "10";
                    } else {
                        t.style.opacity = "0.1";
                    }
                });
            } else {
                alert("⚠️ Debes ver el anuncio por 6 segundos para recibir la ayuda.");
            }
        };
    }

    function resetGame() {
        energy = 0;
        barWidth = 30;
        timeLeft = 100;
        dropSpeed = 0.6; // Volvemos a la velocidad inicial
        tContainer.style.width = "30%";
        updateEnergy();
        initRound();
    }

    initRound();
</script>
</body>
</html>
