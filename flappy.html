<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W-MEMORIA ELITE V2</title>
    <style>
        :root {
            --bg: #0d0221;
            --w-magenta: #ff00ff;
            --w-blue: #007bff;
            --w-cyan: #00ffff;
            --w-yellow: #ffcc00;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            z-index: 10;
        }

        .stats-box { text-align: center; }
        .stats-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stats-value { font-size: 1.3rem; display: block; color: var(--w-cyan); font-weight: 900; }
        #timer { color: #ff2d2d; }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 95%;
            max-width: 400px;
            margin-top: 10px;
        }

        .card {
            background: none; border: none; aspect-ratio: 1;
            perspective: 1000px; position: relative; padding: 0;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .card.show { opacity: 1; transform: translateY(0); }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s; transform-style: preserve-3d;
            border-radius: 12px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            align-items: center; justify-content: center;
            border-radius: 12px; font-size: 1.8rem;
        }

        .card-front { color: white; font-weight: 900; font-size: 2rem; }
        .card-back { background-color: white; transform: rotateY(180deg); color: #000; }

        .c1 { background-color: var(--w-blue); }
        .c2 { background-color: var(--w-magenta); }
        .c3 { background-color: var(--w-cyan); }
        .c4 { background-color: var(--w-yellow); }

        #btn-eye {
            position: fixed; bottom: 30px; right: 20px;
            background: radial-gradient(circle, #007bff, #001a33);
            border: 2px solid var(--w-cyan); color: white;
            font-size: 1.8rem; width: 70px; height: 70px;
            border-radius: 50%; box-shadow: 0 0 20px rgba(0,255,255,0.5);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }

        #msg-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="stats-box">
            <span class="stats-label">Progreso</span>
            <span id="level-txt" class="stats-value">NIVEL 1</span>
        </div>
        <div class="stats-box">
            <span class="stats-label">Tiempo</span>
            <span id="timer" class="stats-value">01:00</span>
        </div>
        <button style="background:none; border:1px solid #444; color:white; border-radius:5px; padding: 5px 10px;" onclick="location.href='index.html'">X</button>
    </header>

    <main id="game-grid"></main>

    <button id="btn-eye" onclick="activarPista()">👁️</button>

    <div id="msg-overlay">
        <h2 id="msg-title" style="font-size: 2.5rem; color: var(--w-magenta);"></h2>
        <p id="msg-body" style="margin-bottom: 30px;"></p>
        <button onclick="location.reload()" style="padding:15px 40px; border-radius:30px; background:var(--w-cyan); border:none; font-weight:bold; color: black; font-size: 1.1rem;">REINTENTAR</button>
    </div>

    <script>
        const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";
        const grid = document.getElementById('game-grid');
        const timerDisplay = document.getElementById('timer');
        const levelDisplay = document.getElementById('level-txt');
        
        const levels = [2, 3, 4, 4, 6, 6, 8, 8, 10, 10, 12, 12, 14, 14, 16];
        let currentLevel = 0;
        let timeLeft = 60;
        let timerId;
        let lockGrid = false;
        let flippedCards = [];
        const icons = ['🍕','🚀','🐱','💎','🎨','🌈','🍦','🎸','🏀','🎧','🍀','🔥','🍄','⭐','🌙','🍎'];
        const colors = ['c1', 'c2', 'c3', 'c4'];

        function initLevel() {
            grid.innerHTML = '';
            flippedCards = [];
            lockGrid = true;
            
            // 1. Actualizar texto de nivel
            levelDisplay.innerText = `NIVEL ${currentLevel + 1}`;
            
            // 2. Calcular y reiniciar tiempo según el nivel
            // Sube 10 seg cada 2 niveles: Niv 1-2 (60s), Niv 3-4 (70s), Niv 5-6 (80s)...
            timeLeft = 60 + (Math.floor(currentLevel / 2) * 10);
            updateTimerDisplay();

            let numPairs = levels[currentLevel];
            let levelIcons = [...icons.slice(0, numPairs), ...icons.slice(0, numPairs)];
            levelIcons.sort(() => Math.random() - 0.5);

            levelIcons.forEach((icon, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front ${colors[i % 4]}">W</div>
                        <div class="card-face card-back">${icon}</div>
                    </div>`;
                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });

            const cardElements = document.querySelectorAll('.card');
            let indices = Array.from(Array(cardElements.length).keys()).sort(() => Math.random() - 0.5);
            
            indices.forEach((pos, i) => {
                setTimeout(() => {
                    cardElements[pos].classList.add('show');
                    if(i === indices.length - 1) lockGrid = false;
                }, 800 / cardElements.length); // Ajuste de velocidad según cantidad
            });

            if(timerId) clearInterval(timerId);
            startTimer();
        }

        function updateTimerDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function flipCard() {
            if (lockGrid || this.classList.contains('flipped') || flippedCards.length >= 2) return;
            this.classList.add('flipped');
            flippedCards.push(this);
            if (flippedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            lockGrid = true;
            const [c1, c2] = flippedCards;
            if (c1.dataset.icon === c2.dataset.icon) {
                flippedCards = [];
                lockGrid = false;
                if(document.querySelectorAll('.card.flipped').length === levels[currentLevel] * 2) {
                    currentLevel++;
                    if(currentLevel >= levels.length) endGame(true);
                    else setTimeout(initLevel, 800);
                }
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    lockGrid = false;
                }, 700);
            }
        }

        function activarPista() {
            if(lockGrid) return;
            let start = Date.now();
            window.open(smartlink, '_blank');
            
            window.onfocus = function() {
                let duration = (Date.now() - start) / 1000;
                if(duration >= 6) {
                    lockGrid = true;
                    const all = document.querySelectorAll('.card');
                    const alreadyFlipped = Array.from(all).filter(c => c.classList.contains('flipped'));
                    
                    all.forEach(c => c.classList.add('flipped'));
                    
                    setTimeout(() => {
                        all.forEach(c => {
                            // Solo regresamos las que NO estaban ya emparejadas antes de la pista
                            if (!alreadyFlipped.includes(c)) {
                                c.classList.remove('flipped');
                            }
                        });
                        lockGrid = false;
                    }, 1200);
                } else {
                    alert("Debes ver el anuncio por al menos 6 segundos ⏱️");
                }
            }
        }

        function endGame(win) {
            clearInterval(timerId);
            document.getElementById('msg-overlay').style.display = 'flex';
            document.getElementById('msg-title').innerText = win ? "¡ELITE!" : "¡TIEMPO!";
            document.getElementById('msg-body').innerText = win ? "Dominas la memoria a nivel experto." : "El cronómetro te ha vencido esta vez.";
        }

        initLevel();
    </script>
</body>
</html>
