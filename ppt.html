<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e14">
    <title>PPT - MULTIJUGADOR PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #e94560;
            --gold: #ffd700;
            --win: #00ff88;
            --danger: #ff4444;
            --electric-blue: #0044ff;
            --ad-height: 60px; /* Espacio para el banner */
        }

        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 0;
            overflow: hidden;
            /* Evita que el contenido quede oculto tras el anuncio */
            padding-bottom: var(--ad-height);
        }

        /* --- EFECTOS VISUALES --- */
        .money-rain {
            position: fixed;
            top: -50px;
            font-size: 2rem;
            z-index: 2000;
            pointer-events: none;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        .screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
            background-color: var(--bg);
        }

        #game-ui { 
            display: none; 
            padding-top: 10px; 
            height: calc(100vh - var(--ad-height)); 
            background: var(--bg); 
            overflow-y: auto; 
        }
        
        .stats-bar {
            background: #1a1a2e; padding: 12px;
            margin: 5px 20px; border-radius: 15px;
            border: 1px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
        }
        #balance { color: var(--win); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,136,0.5); }

        .game-zone {
            height: 160px; display: flex; flex-direction: column;
            justify-content: center; background: #16213e;
            border-radius: 25px; margin: 10px 20px;
            border: 2px solid #0f3460;
        }

        @keyframes shakeHand {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(-10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .animating-hand { display: inline-block; font-size: 3.5rem; animation: shakeHand 0.4s infinite; }

        .choice-btn { font-size: 30px; background: #1a1a2e; border: 2px solid transparent; border-radius: 15px; padding: 10px; transition: 0.2s; cursor: pointer; }
        .choice-btn.selected { border-color: var(--gold); background: #0f3460; transform: scale(1.1); }

        .bet-opt { background: #1a1a2e; border: 2px solid #444; color: white; padding: 8px 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .bet-opt.active { border-color: var(--gold); background: #0f3460; color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.4); }

        #action-btn { background: var(--win); color: #000; font-weight: 900; font-size: 1.2rem; width: 90%; padding: 15px; border: none; border-radius: 50px; margin: 5px auto; transition: 0.3s; cursor: pointer; }
        #action-btn:disabled { background: #555; color: #aaa; }
        #btn-recarga { background: var(--gold); color: #000; width: 90%; padding: 12px; font-weight: 900; border-radius: 50px; border: none; margin: 5px auto; cursor: pointer; }
        
        .btn-exit-red { background: var(--danger); color: white; padding: 8px 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 0.8rem; cursor: pointer; }

        .chat-container {
            background: #0b0e14; height: 100px; margin: 5px 20px;
            border-radius: 15px; display: flex; flex-direction: column; border: 1px solid #333;
        }
        #chat-messages { flex-grow: 1; overflow-y: auto; text-align: left; padding: 8px; font-size: 0.8rem; color: #bbb; }
        
        input { background: #1a1a2e; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; width: 80%; text-align: center; margin: 10px 0; }

        /* --- CONTENEDOR PUBLICIDAD --- */
        .ad-container-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--ad-height);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="screen-multi-setup" class="screen">
        <div style="background: #1a1a2e; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); width: 85%;">
            <h2 style="color:var(--gold); margin-top:0;">PIEDRA PAPEL TIJERAS</h2>
            <p>TU APODO:</p>
            <input type="text" id="player-name" placeholder="Ej: pedro">
            <p>CÓDIGO DE SALA:</p>
            <input type="text" id="room-id" placeholder="Ej: 777">
            <br><br>
            <button onclick="startMulti()" style="background:var(--electric-blue); color:white; border:none; padding:15px 40px; border-radius:50px; font-weight:bold; width:100%;">CONECTAR Y JUGAR</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="stats-bar">
            <div id="balance">💵 $<span id="money">2000</span></div>
            <button class="btn-exit-red" onclick="location.reload()">SALIR</button>
        </div>
        
        <div id="player-info" style="color: var(--gold); font-size: 0.9rem; margin: 5px;"></div>

        <div class="game-zone" id="display">
            <div style="font-size: 3rem;">🤝</div>
            <div id="status-text" style="color:var(--gold)">ESPERANDO RIVAL...</div>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 10px; margin: 10px;">
            <button class="choice-btn" id="btn-piedra" onclick="selectChoice('piedra')">✊</button>
            <button class="choice-btn" id="btn-papel" onclick="selectChoice('papel')">✋</button>
            <button class="choice-btn" id="btn-tijera" onclick="selectChoice('tijera')">✌️</button>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 10px;">
            <button class="bet-opt active" onclick="setBet(500, this)">$500</button>
            <button class="bet-opt" onclick="setBet(1000, this)">$1000</button>
            <button class="bet-opt" onclick="setBet(2000, this)">$2000</button>
        </div>
        
        <button id="action-btn" onclick="handleAction()">APOSTAR AHORA</button>
        <button id="btn-recarga" onclick="recargarDinero()">RECARGAR (6s Ads)</button>

        <div class="chat-container">
            <div id="chat-messages"></div>
            <div style="display:flex; padding:5px; background:#1a1a2e; border-radius:0 0 15px 15px;">
                <input type="text" id="chat-input" placeholder="Insulta a tu rival..." style="flex-grow:1; margin:0; padding:5px; font-size:0.8rem; border:none;">
                <button onclick="sendChatMessage()" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:5px; font-weight:bold;">ENVIAR</button>
            </div>
        </div>
    </div>

    <div class="ad-container-fixed">
        <script type="text/javascript">
            atOptions = {
                'key' : '20622febebc58aceaadca806e30f7816',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/20622febebc58aceaadca806e30f7816/invoke.js"></script>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyABXFpDsl2Q1Iz6V97FEKHxBho", databaseURL: "https://juego-piedra-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let money = 2000;
        let currentMoneyDisplay = 2000; 
        let currentBet = 500;
        let playerChoice = "";
        let myName = "";
        let currentRoom = "";
        let playerNumber = 1;
        let gameState = "idle";
        const smartlink = "https://www.profitablecpmratenetwork.com/p2y3r3phx?key=0a9217a59faa68685a1f87c8ae5fc3ea";

        function setBet(amt, btn) {
            currentBet = amt;
            document.querySelectorAll('.bet-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startMulti() {
            const r = document.getElementById('room-id').value.trim();
            const n = document.getElementById('player-name').value.trim();
            if(!r || !n) return alert("Pon tu nombre y el código!");
            
            myName = n; currentRoom = r;
            document.getElementById('screen-multi-setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';

            const ref = db.ref('rooms/' + r);
            db.ref('chats/' + r).remove(); 

            ref.on('value', s => {
                const d = s.val();
                if(!d) {
                    playerNumber = 1;
                    ref.set({ status: "waiting", p1_name: n, p2_name: "...", p1_choice: "", p2_choice: "" });
                    return;
                }
                if(d.p1_name !== n && d.p2_name === "...") {
                    playerNumber = 2;
                    ref.update({ status: "ready", p2_name: n });
                }
                
                let rival = (playerNumber === 1) ? d.p2_name : d.p1_name;
                document.getElementById('player-info').innerText = `${myName} VS ${rival}`;
                
                if(d.p1_choice && d.p2_choice) processResult(d.p1_choice, d.p2_choice);
            });
            setupChat();
        }

        function handleAction() {
            if(money < currentBet) return alert("No tienes suficiente dinero!");
            if(!playerChoice) return alert("¡Selecciona una mano primero!");
            
            if(gameState === "idle") {
                gameState = "counting";
                document.getElementById('action-btn').disabled = true;
                let c = 3;
                const t = setInterval(() => {
                    document.getElementById('display').innerHTML = `
                        <div style="display:flex; justify-content:center; gap:20px;">
                            <div class="animating-hand">✊</div>
                            <div class="animating-hand" style="transform: scaleX(-1);">✊</div>
                        </div>
                        <div style="font-size:2.5rem; color:var(--gold); font-weight:900;">${c === 0 ? "¡YA!" : c}</div>
                    `;
                    c--;
                    if(c < -1) {
                        clearInterval(t);
                        const up = {};
                        up[`p${playerNumber}_choice`] = playerChoice;
                        db.ref('rooms/' + currentRoom).update(up);
                        document.getElementById('display').innerHTML = '<div style="color:var(--gold); font-size:1.2rem;">ESPERANDO AL RIVAL...</div>';
                    }
                }, 800);
            } else {
                resetGame();
            }
        }

        function animateBalance(target) {
            const moneySpan = document.getElementById('money');
            const step = Math.ceil(Math.abs(target - currentMoneyDisplay) / 30);
            const interval = setInterval(() => {
                if (currentMoneyDisplay < target) {
                    currentMoneyDisplay = Math.min(target, currentMoneyDisplay + step);
                } else if (currentMoneyDisplay > target) {
                    currentMoneyDisplay = Math.max(target, currentMoneyDisplay - step);
                }
                moneySpan.innerText = currentMoneyDisplay;
                if (currentMoneyDisplay === target) clearInterval(interval);
            }, 30);
        }

        function createMoneyRain() {
            const emojis = ['💸', '💵', '💰', '🤑'];
            for (let i = 0; i < 25; i++) {
                const bill = document.createElement('div');
                bill.className = 'money-rain';
                bill.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                bill.style.left = Math.random() * 100 + 'vw';
                bill.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(bill);
                setTimeout(() => bill.remove(), 2500);
            }
        }

        function processResult(p1, p2) {
            if(gameState !== "counting") return;
            const mine = (playerNumber === 1) ? p1 : p2;
            const enemy = (playerNumber === 1) ? p2 : p1;
            
            let res = (mine === enemy) ? 0 : ((mine==='piedra'&&enemy==='tijera')||(mine==='papel'&&enemy==='piedra')||(mine==='tijera'&&enemy==='papel')) ? 1 : 2;
            
            if(res === 1) money += currentBet;
            else if(res === 2) money -= currentBet;

            animateBalance(money);
            if (res === 1) createMoneyRain();

            let html = (res === 1) ? `<h2 style="color:var(--win); text-shadow:0 0 15px var(--win)">¡GANASTE! 😎💸</h2>` : (res === 2) ? `<h2 style="color:var(--danger)">PERDISTE 🤡</h2>` : `<h2>EMPATE 🤝</h2>`;
            document.getElementById('display').innerHTML = html + `<p>${mine.toUpperCase()} vs ${enemy.toUpperCase()}</p>`;
            
            gameState = "result";
            document.getElementById('action-btn').disabled = false;
            document.getElementById('action-btn').innerText = "OTRA RONDA";
            
            if(playerNumber === 1) {
                setTimeout(() => db.ref('rooms/' + currentRoom).update({ p1_choice: "", p2_choice: "" }), 2000);
            }
        }

        function resetGame() {
            gameState = "idle";
            playerChoice = "";
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('action-btn').innerText = "APOSTAR AHORA";
            document.getElementById('display').innerHTML = '<div style="font-size: 3rem;">🤝</div><div id="status-text" style="color:var(--gold)">LISTO PARA OTRA</div>';
        }

        function selectChoice(c) { 
            playerChoice = c; 
            document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected')); 
            document.getElementById('btn-' + c).classList.add('selected'); 
        }

        function recargarDinero() {
            let start = Date.now();
            window.open(smartlink, '_blank');
            window.onfocus = function() {
                if(Date.now() - start >= 6000) {
                    money += 500;
                    animateBalance(money);
                    createMoneyRain();
                } else {
                    alert("Debes esperar los 6 segundos del anuncio.");
                }
                window.onfocus = null;
            };
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            db.ref('chats/' + currentRoom).push({ name: myName, text: input.value });
            input.value = "";
        }

        function setupChat() {
            db.ref('chats/' + currentRoom).on('child_added', s => {
                const d = s.val();
                const div = document.createElement('div');
                div.innerHTML = `<b>${d.name}:</b> ${d.text}`;
                document.getElementById('chat-messages').appendChild(div);
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            });
        }
    </script>
</body>
</html>
